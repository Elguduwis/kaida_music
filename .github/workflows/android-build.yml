name: Android CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - run: flutter create --platforms=android .

    - run: flutter pub get

    # Fix on_audio_query_android namespace
    - name: Patch on_audio_query_android namespace
      run: |
        PLUGIN_PATH=$(find ~/.pub-cache -type d -path "*/on_audio_query_android-*" | head -1)
        if [ -d "$PLUGIN_PATH" ]; then
          GRADLE_FILE="$PLUGIN_PATH/android/build.gradle"
          if ! grep -q "namespace" "$GRADLE_FILE"; then
            sed -i '/^android {/a \    namespace "com.lucasjosino.on_audio_query"' "$GRADLE_FILE"
          fi
        fi

    # Configure gradle.properties
    - name: Configure gradle.properties
      run: |
        cat > android/gradle.properties << 'PROPS'
        org.gradle.jvmargs=-Xmx4G
        android.useAndroidX=true
        android.enableJetifier=true
        kotlin.jvm.target.validation.mode=warning
        PROPS

    # Configure toolchain
    - name: Configure Java toolchain
      run: |
        cat >> android/app/build.gradle.kts << 'GRADLE'

        kotlin {
            jvmToolchain(17)
        }
        java {
            toolchain {
                languageVersion.set(JavaLanguageVersion.of(17))
            }
        }
        GRADLE

        cat >> android/build.gradle.kts << 'ROOT'

        allprojects {
            tasks.withType<org.jetbrains.kotlin.gradle.tasks.KotlinCompile>().configureEach {
                compilerOptions {
                    jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17)
                }
            }
        }
        ROOT

    # Add ALL required permissions to AndroidManifest.xml
    - name: Add storage permissions to AndroidManifest.xml
      run: |
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        
        # Add READ_EXTERNAL_STORAGE (for Android 12 and below)
        if ! grep -q "READ_EXTERNAL_STORAGE" "$MANIFEST"; then
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />' "$MANIFEST"
        fi
        
        # Add WRITE_EXTERNAL_STORAGE (needed by on_audio_query)
        if ! grep -q "WRITE_EXTERNAL_STORAGE" "$MANIFEST"; then
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />' "$MANIFEST"
        fi
        
        # Add READ_MEDIA_AUDIO (for Android 13+)
        if ! grep -q "READ_MEDIA_AUDIO" "$MANIFEST"; then
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />' "$MANIFEST"
        fi
        
        # Add POST_NOTIFICATIONS for media controls
        if ! grep -q "POST_NOTIFICATIONS" "$MANIFEST"; then
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "$MANIFEST"
        fi
        
        # Add FOREGROUND_SERVICE for audio playback
        if ! grep -q "FOREGROUND_SERVICE" "$MANIFEST"; then
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' "$MANIFEST"
        fi
        
        # Add WAKE_LOCK to keep device awake during playback
        if ! grep -q "WAKE_LOCK" "$MANIFEST"; then
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.WAKE_LOCK" />' "$MANIFEST"
        fi
        
        # Add requestLegacyExternalStorage to application tag
        if ! grep -q "requestLegacyExternalStorage" "$MANIFEST"; then
          sed -i 's/<application/<application android:requestLegacyExternalStorage="true"/' "$MANIFEST"
        fi
        
        echo "=== AndroidManifest.xml contents ==="
        cat "$MANIFEST"

    - run: flutter build apk --release

    - uses: actions/upload-artifact@v4
      with:
        name: Kaida-Music-APK
        path: build/app/outputs/flutter-apk/app-release.apk

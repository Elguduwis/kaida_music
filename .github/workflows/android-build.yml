name: Android CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - run: flutter create --platforms=android .

    - run: flutter pub get

    # Fix on_audio_query_android namespace issue
    - name: Patch on_audio_query_android plugin
      run: |
        # Locate the plugin directory
        PLUGIN_PATH=$(find ~/.pub-cache -type d -path "*/on_audio_query_android-*" | head -1)
        if [ -d "$PLUGIN_PATH" ]; then
          GRADLE_FILE="$PLUGIN_PATH/android/build.gradle"
          echo "Patching $GRADLE_FILE"
          
          # Check if namespace already present
          if grep -q "namespace" "$GRADLE_FILE"; then
            echo "Namespace already exists. Skipping."
          else
            # Insert 'namespace "com.lucasjosino.on_audio_query"' after 'android {' line
            sed -i '/^android {/a \    namespace "com.lucasjosino.on_audio_query"' "$GRADLE_FILE"
            echo "Namespace added."
          fi
          
          # Verify
          cat "$GRADLE_FILE" | head -20
        else
          echo "Plugin directory not found!"
          exit 1
        fi

    - run: flutter build apk --release

    - uses: actions/upload-artifact@v4
      with:
        name: Kaida-Music-APK
        path: build/app/outputs/flutter-apk/app-release.apk

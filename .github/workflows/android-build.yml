name: Android CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - run: flutter create --platforms=android .

    - run: flutter pub get

    # Fix on_audio_query_android namespace
    - name: Patch on_audio_query_android namespace
      run: |
        PLUGIN_PATH=$(find ~/.pub-cache -type d -path "*/on_audio_query_android-*" | head -1)
        if [ -d "$PLUGIN_PATH" ]; then
          GRADLE_FILE="$PLUGIN_PATH/android/build.gradle"
          if ! grep -q "namespace" "$GRADLE_FILE"; then
            sed -i '/^android {/a \    namespace "com.lucasjosino.on_audio_query"' "$GRADLE_FILE"
          fi
        fi

    # Configure gradle.properties for JVM target validation
    - name: Configure gradle.properties
      run: |
        cat > android/gradle.properties << 'PROPS'
        org.gradle.jvmargs=-Xmx4G
        android.useAndroidX=true
        android.enableJetifier=true
        kotlin.jvm.target.validation.mode=warning
        PROPS

    # Configure toolchain in app/build.gradle.kts
    - name: Configure Java toolchain
      run: |
        cat >> android/app/build.gradle.kts << 'GRADLE'

        kotlin {
            jvmToolchain(17)
        }
        java {
            toolchain {
                languageVersion.set(JavaLanguageVersion.of(17))
            }
        }
        GRADLE

        cat >> android/build.gradle.kts << 'ROOT'

        allprojects {
            tasks.withType<org.jetbrains.kotlin.gradle.tasks.KotlinCompile>().configureEach {
                compilerOptions {
                    jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17)
                }
            }
        }
        ROOT

    # Update AndroidManifest.xml with proper permissions
    - name: Configure Android permissions
      run: |
        cat > android/app/src/main/AndroidManifest.xml << 'MANIFEST'
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
            <uses-permission android:name="android.permission.WAKE_LOCK"/>
            
            <application
                android:label="Kaida Music"
                android:name="\${applicationName}"
                android:icon="@mipmap/ic_launcher"
                android:requestLegacyExternalStorage="true">
                
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:launchMode="singleTop"
                    android:theme="@style/LaunchTheme"
                    android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                    android:hardwareAccelerated="true"
                    android:windowSoftInputMode="adjustResize">
                    <meta-data
                      android:name="io.flutter.embedding.android.NormalTheme"
                      android:resource="@style/NormalTheme"
                      />
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
                
                <meta-data
                    android:name="flutterEmbedding"
                    android:value="2" />
            </application>
        </manifest>
        MANIFEST

    - run: flutter build apk --release

    - uses: actions/upload-artifact@v4
      with:
        name: Kaida-Music-APK
        path: build/app/outputs/flutter-apk/app-release.apk

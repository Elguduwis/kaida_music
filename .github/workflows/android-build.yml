name: Android CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # Create Android platform files (ONLY in cloud)
    - run: flutter create --platforms=android .

    - run: flutter pub get

    # Patch the on_audio_query_android plugin to add missing namespace
    - name: Fix Android namespace for on_audio_query_android
      run: |
        PLUGIN_DIR="$HOME/.pub-cache/hosted/pub.dev/on_audio_query_android-*"
        BUILD_FILE="$PLUGIN_DIR/android/build.gradle"
        if [ -f "$BUILD_FILE" ]; then
          # Check if namespace already exists
          if ! grep -q "namespace" "$BUILD_FILE"; then
            # Add namespace line after 'android {' block
            sed -i '/android {/a \    namespace "com.lucasjosino.on_audio_query"' "$BUILD_FILE"
          fi
        fi

    - run: flutter build apk --release

    - uses: actions/upload-artifact@v4
      with:
        name: Kaida-Music-APK
        path: build/app/outputs/flutter-apk/app-release.apk

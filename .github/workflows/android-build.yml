name: Android CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - run: flutter create --platforms=android .

    - run: flutter pub get

    # Fix on_audio_query_android namespace (still needed)
    - name: Patch on_audio_query_android plugin (namespace)
      run: |
        PLUGIN_PATH=$(find ~/.pub-cache -type d -path "*/on_audio_query_android-*" | head -1)
        if [ -d "$PLUGIN_PATH" ]; then
          GRADLE_FILE="$PLUGIN_PATH/android/build.gradle"
          if grep -q "namespace" "$GRADLE_FILE"; then
            echo "Namespace already exists."
          else
            sed -i '/^android {/a \    namespace "com.lucasjosino.on_audio_query"' "$GRADLE_FILE"
            echo "Namespace added."
          fi
        else
          echo "Plugin directory not found!"
          exit 1
        fi

    # Fix JVM target compatibility for Kotlin and Java
    - name: Align Kotlin JVM target to 1.8
      run: |
        # For projects using build.gradle.kts (Flutter default)
        if [ -f android/build.gradle.kts ]; then
          # Add subprojects block to set Kotlin JVM target
          cat >> android/build.gradle.kts << 'EOF'

        subprojects {
            tasks.withType<org.jetbrains.kotlin.gradle.tasks.KotlinCompile>().configureEach {
                kotlinOptions {
                    jvmTarget = "1.8"
                }
            }
        }
        EOF
        fi
        
        # Also handle legacy build.gradle (just in case)
        if [ -f android/build.gradle ]; then
          cat >> android/build.gradle << 'EOF'

        subprojects {
            tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                kotlinOptions {
                    jvmTarget = "1.8"
                }
            }
        }
        EOF
        fi

    - run: flutter build apk --release

    - uses: actions/upload-artifact@v4
      with:
        name: Kaida-Music-APK
        path: build/app/outputs/flutter-apk/app-release.apk

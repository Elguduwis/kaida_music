name: Android CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - run: flutter create --platforms=android .

    - run: flutter pub get

    # Fix on_audio_query_android namespace
    - name: Patch on_audio_query_android namespace
      run: |
        PLUGIN_PATH=$(find ~/.pub-cache -type d -path "*/on_audio_query_android-*" | head -1)
        if [ -d "$PLUGIN_PATH" ]; then
          GRADLE_FILE="$PLUGIN_PATH/android/build.gradle"
          if ! grep -q "namespace" "$GRADLE_FILE"; then
            sed -i '/^android {/a \    namespace "com.lucasjosino.on_audio_query"' "$GRADLE_FILE"
          fi
        fi

    # COMPREHENSIVE JVM TARGET FIX - Using Gradle Toolchain
    - name: Configure Java Toolchain for consistent JVM target
      run: |
        # Create a gradle.properties file to disable JVM target validation (treat as warning instead of error)
        cat > android/gradle.properties << 'PROPS'
        org.gradle.jvmargs=-Xmx4G
        android.useAndroidX=true
        android.enableJetifier=true
        kotlin.jvm.target.validation.mode=warning
        PROPS

        # Configure toolchain in app/build.gradle.kts
        cat >> android/app/build.gradle.kts << 'GRADLE'

        // Java toolchain configuration for consistent JVM target
        kotlin {
            jvmToolchain(17)
        }
        java {
            toolchain {
                languageVersion.set(JavaLanguageVersion.of(17))
            }
        }
        GRADLE

        # Also add to root build.gradle.kts for all subprojects
        cat >> android/build.gradle.kts << 'ROOT'

        allprojects {
            tasks.withType<org.jetbrains.kotlin.gradle.tasks.KotlinCompile>().configureEach {
                compilerOptions {
                    jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17)
                }
            }
        }
        ROOT

    - run: flutter build apk --release

    - uses: actions/upload-artifact@v4
      with:
        name: Kaida-Music-APK
        path: build/app/outputs/flutter-apk/app-release.apk
